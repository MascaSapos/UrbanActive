<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanActive – Iniciar sesión</title>
  <meta name="description" content="Accede a UrbanActive para buscar y reservar actividades deportivas al aire libre en Madrid.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" th:href="@{/css/login.css}" href="../static/css/login.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <!-- LOGO (siempre visible) -->
    <div class="login-logo">
      <div class="login-logo__wordmark">UrbanActive</div>
      <div class="login-logo__sub">Deporte urbano en Madrid</div>
    </div>

    <!-- ── PANEL: LOGIN ──────────────────────────────────── -->
    <div id="panel-login" class="panel is-visible">

      <div class="role-toggle" role="group" aria-label="Tipo de usuario">
        <button type="button" class="role-toggle__btn is-active" aria-pressed="true" data-role="deportista">Deportista</button>
        <button type="button" class="role-toggle__btn" aria-pressed="false" data-role="organizador">Organizador</button>
      </div>
      <p class="role-hint" id="role-hint">Buscas y reservas actividades deportivas</p>

      <form class="login-form" th:action="@{/login}" method="post" novalidate>
        <input type="hidden" name="rol" id="input-rol" value="deportista">

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="login-submit" id="submit-btn" disabled>Entrar</button>
      </form>

      <p class="login-footer">
        ¿No tienes cuenta? <a id="go-register" href="#">Regístrate</a>
      </p>
    </div>

    <!-- ── PANEL: REGISTER ───────────────────────────────── -->
    <div id="panel-register" class="panel">

      <div class="register-header">
        <button type="button" class="register-header__back" id="go-login" aria-label="Volver al inicio de sesión">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div>
          <div class="register-header__title">Crear cuenta</div>
          <div class="register-header__sub">Es gratis y solo tarda un minuto</div>
        </div>
      </div>

      <div class="role-toggle" role="group" aria-label="Tipo de usuario">
        <button type="button" class="reg-role-toggle__btn role-toggle__btn is-active" aria-pressed="true" data-role="deportista">Deportista</button>
        <button type="button" class="reg-role-toggle__btn role-toggle__btn" aria-pressed="false" data-role="organizador">Organizador</button>
      </div>
      <p class="role-hint" id="reg-role-hint">Buscas y reservas actividades deportivas</p>

      <form class="register-form" id="register-form" novalidate>
        <input type="hidden" id="reg-input-rol" value="deportista">

        <div class="form-group">
          <label for="reg-name">Nombre</label>
          <input type="text" id="reg-name" name="nombre" placeholder="Tu nombre" autocomplete="name" required minlength="2">
        </div>

        <div class="form-group">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" name="email" placeholder="tu@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="reg-password">Contraseña</label>
          <input type="password" id="reg-password" name="password" placeholder="Mín. 6 caracteres" autocomplete="new-password" required minlength="6">
          <div class="pw-strength" aria-hidden="true">
            <div class="pw-strength__bar"></div>
            <div class="pw-strength__bar"></div>
            <div class="pw-strength__bar"></div>
          </div>
          <div class="pw-strength-label" id="pw-strength-label"></div>
        </div>

        <div class="form-group">
          <label for="reg-password2">Confirmar contraseña</label>
          <input type="password" id="reg-password2" name="password2" placeholder="Repite tu contraseña" autocomplete="new-password" required>
          <div class="form-error" id="reg-pass2-error"></div>
        </div>

        <button type="submit" class="register-submit" id="reg-submit-btn" disabled>Crear cuenta</button>
      </form>

      <p class="login-footer">
        ¿Ya tienes cuenta? <a id="go-login-2" href="#">Inicia sesión</a>
      </p>
    </div>

  </div>
</div>
<script th:src="@{/js/login.js}" src="../static/js/login.js"></script>
</body>
</html>
